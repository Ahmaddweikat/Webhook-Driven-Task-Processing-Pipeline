name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PORT: 8080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Push database schema
        run: npx drizzle-kit push

      - name: Build
        run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push API image
        run: |
          docker build -f Dockerfile \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/api:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/api:latest .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/api:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/api:latest

      - name: Build and push Worker image
        run: |
          docker build -f Dockerfile.worker \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/worker:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/worker:latest .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/worker:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/worker:latest

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy pipeline-service \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/api:${{ github.sha }} \
            --platform managed \
            --region us-east1 \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=production,JWT_SECRET=${{ secrets.JWT_SECRET }},DATABASE_URL=${{ secrets.DATABASE_URL }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"

      - name: Deploy Worker as Cloud Run Job
        run: |
          gcloud run jobs update pipeline-service-worker \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/worker:${{ github.sha }} \
            --region us-east1 \
            --set-env-vars="NODE_ENV=production,JWT_SECRET=${{ secrets.JWT_SECRET }},DATABASE_URL=${{ secrets.DATABASE_URL }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
          || gcloud run jobs create pipeline-service-worker \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/worker:${{ github.sha }} \
            --region us-east1 \
            --set-env-vars="NODE_ENV=production,JWT_SECRET=${{ secrets.JWT_SECRET }},DATABASE_URL=${{ secrets.DATABASE_URL }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"
