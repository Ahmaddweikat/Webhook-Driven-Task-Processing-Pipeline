name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  id-token: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pipeline_service_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://neondb_owner:npg_uY0agKRDtF9N@ep-soft-bird-anuo0mcl-pooler.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      JWT_SECRET: 7d4b6932b72de09eba64d1d548bcd62120192672ebd29bcb0969a7b7caad761fce303c4a822419a6c7c5565bd01c64f1791a0ddcb9ece63388d8c2a2ddead004
      ANTHROPIC_API_KEY: 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
      PORT: 8080

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Push database schema
        run: npx drizzle-kit push

      - name: Build
        run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push API image
        run: |
          docker build -f Dockerfile \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/api:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/api:latest .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/api:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/api:latest

      - name: Build and push Worker image
        run: |
          docker build -f Dockerfile.worker \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/worker:${{ github.sha }} \
            -t us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/worker:latest .
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/worker:${{ github.sha }}
          docker push us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/worker:latest

      - name: Deploy API to Cloud Run
        run: |
          gcloud run deploy pipeline-service \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/api:${{ github.sha }} \
            --platform managed \
            --region us-east1 \
            --allow-unauthenticated \
            --set-env-vars="NODE_ENV=production,JWT_SECRET=${{ secrets.JWT_SECRET }},DATABASE_URL=${{ secrets.DATABASE_URL }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"

      - name: Deploy Worker to Cloud Run
        run: |
          gcloud run deploy pipeline-service-worker \
            --image us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/pipeline-service/worker:${{ github.sha }} \
            --platform managed \
            --region us-east1 \
            --min-instances=1 \
            --set-env-vars="NODE_ENV=production,JWT_SECRET=${{ secrets.JWT_SECRET }},DATABASE_URL=${{ secrets.DATABASE_URL }},ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}"
